<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Snake</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p id="status">Use arrow keys or swipe to start</p>

  <div id="controls">
    <button id="startButton" type="button">▶ Start Game</button>
    <button id="muteButton" type="button">🔊 Mute</button>
  </div>

  <!-- These don't show up on the page — they're just containers
       the JavaScript tells to play/pause at the right moments. -->
  <audio id="backgroundMusic" src="assets/audio/menu-music.wav" loop preload="auto"></audio>
  <audio id="eatSound" src="assets/audio/eat.wav" preload="auto"></audio>
  <audio id="gameOverSound" src="assets/audio/game-over.wav" preload="auto"></audio>

  <script src="game.js"></script>
</body>
</html>
